name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential
    
    - name: Compile
      run: |
        mkdir -p release
        g++ -std=c++17 -Iinclude -o release/bulk src/bulk.cpp
    
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: bulk
        path: release/bulk
