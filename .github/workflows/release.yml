name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'include/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential
    
    - name: Compile
      run: |
        mkdir -p release
        g++ -std=c++17 -O3 -Iinclude -o release/bulk src/bulk.cpp
        sha256sum release/bulk > release/bulk.sha256
    
    - name: Get version
      id: version
      run: |
        echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Delete old release (optional)
      uses: actions/github-script@v7
      with:
        script: |
          const releases = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          for (const release of releases.data) {
            if (release.tag_name === 'latest-build') {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest-build',
              });
            }
          }
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: "Latest Build - ${{ steps.version.outputs.VERSION }}"
        files: |
          release/bulk
          release/bulk.sha256
        body: |
          ## Автоматическая сборка
          - **Время**: ${{ steps.version.outputs.VERSION }}
          - **Коммит**: ${{ github.sha }}
          - **Автор**: ${{ github.actor }}
          
          ### Изменения в этом коммите:
          ${{ github.event.head_commit.message }}
          
          ### Скачать:
          - `bulk` - исполняемый файл
          - `bulk.sha256` - контрольная сумма
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
