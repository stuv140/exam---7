name: CMake Build and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential g++
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build with CMake
      run: cmake --build build --config Release --parallel $(nproc)
    
    - name: Prepare release files
      run: |
        mkdir -p release
        # Копируем бинарник из папки сборки
        if [ -f "build/bulk" ]; then
          cp build/bulk release/
        elif [ -f "build/Release/bulk" ]; then
          cp build/Release/bulk release/
        fi
        # Создаем контрольную сумму
        sha256sum release/bulk > release/bulk.sha256
    
    - name: Get version
      id: version
      run: |
        echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        echo "COMMIT_MSG=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
    
    - name: Delete old release
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            for (const release of releases.data) {
              if (release.tag_name === 'latest-build') {
                console.log(`Deleting old release: ${release.tag_name}`);
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });
                
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: 'tags/latest-build',
                  });
                } catch(e) {
                  console.log('Tag already deleted or not found');
                }
              }
            }
          } catch(e) {
            console.log('No old release to delete');
          }
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-build
        name: "Latest Build - ${{ steps.version.outputs.VERSION }}"
        files: |
          release/bulk
          release/bulk.sha256
        body: |
          ## 🚀 Автоматическая CMake сборка
          
          | Параметр | Значение |
          |----------|----------|
          | **Время** | ${{ steps.version.outputs.VERSION }} |
          | **Коммит** | `${{ github.sha }}` |
          | **Автор** | ${{ github.actor }} |
          | **Ветка** | ${{ github.ref_name }} |
          | **CMake** | 3.10+ |
          | **C++ Стандарт** | C++17 |
          | **Оптимизация** | O3 |
