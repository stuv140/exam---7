name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential
    
    - name: Compile
      run: |
        mkdir -p release
        g++ -std=c++17 -O3 -Iinclude -o release/bulk src/bulk.cpp
        chmod +x release/bulk
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/bulk
        name: Release ${{ github.ref_name }}
        body: |
          ## Релиз ${{ github.ref_name }}
          
          ### Исполняемый файл:
          - `bulk` - скомпилированный бинарный файл для Linux
          
          ### Запуск:
          ```bash
          chmod +x bulk
          ./bulk
